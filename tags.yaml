# OPC UA tag list. Managed by live_server.py (edits from the dashboard
# land here too). Connection settings live in connection.yaml.

tags:
- name: TE1
  node: ns=2;s=Process.TE1
  category: temperature
  unit: °C
  min: 0.0
  max: 30.0
  avg: 8.5
  pattern: drift
- name: TE2
  node: ns=2;s=Process.TE2
  category: temperature
  unit: °C
  min: 0.0
  max: 32.0
  avg: 9.8
  pattern: drift
- name: TE3
  node: ns=2;s=Process.TE3
  category: temperature
  unit: °C
  min: 0.0
  max: 27.0
  avg: 5.7
  pattern: drift
- name: TE4
  node: ns=2;s=Process.TE4
  category: temperature
  unit: °C
  min: 0.0
  max: 27.0
  avg: 4.6
  pattern: drift
- name: PT1
  node: ns=2;s=Process.PT1
  category: pressure
  unit: bar
  min: 0.0
  max: 5.5
  avg: 1.05
  pattern: drift
- name: PT2
  node: ns=2;s=Process.PT2
  category: pressure
  unit: bar
  min: 0.0
  max: 8.0
