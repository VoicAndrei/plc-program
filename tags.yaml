- name: PID_CV2
  node: ns=2;s=Control.PID_CV2
  category: control
  unit: '%'
  min: 0.0
  max: 100.0
  avg: 14.7
  pattern: burst
- name: PID_CV3
  node: ns=2;s=Control.PID_CV3
  category: control
  unit: '%'
  min: 0.0
  max: 100.0
  avg: 14.2
  pattern: burst
- name: Motor_Current
  node: ns=2;s=Motor.MCC01.Current
  category: current
  unit: A
  min: 0.0
  max: 400.0
  avg: 28.0
